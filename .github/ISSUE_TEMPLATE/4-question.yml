name: Question
description: Ask a usage or implementation question
labels: ["question"]

body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have read the README and design documentation.
          required: true
        - label: I have searched existing issues for similar questions.
          required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I Tried
      description: Describe commands, docs, or examples you already checked.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add relevant project details or command output.
