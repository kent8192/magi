name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]

body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues for a duplicate report.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the bug clearly.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest command sequence that reproduces the issue.
      placeholder: |
        1. Run `./install.sh --cmd agmsg`
        2. Run `scripts/join.sh ...`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include relevant output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Shell:
        - sqlite3 version:
        - bats version, if test-related:
        - Installed command name:
      render: markdown

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add logs, screenshots, or related links.
